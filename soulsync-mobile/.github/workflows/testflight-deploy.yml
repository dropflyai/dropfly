name: TestFlight Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'package.json'
      - 'app.json'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview or production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build-and-submit:
    name: Build and Submit to TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build iOS app
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build --platform ios --profile $PROFILE --non-interactive

      - name: Submit to TestFlight
        if: github.event.inputs.profile == 'production' || github.ref == 'refs/heads/main'
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas submit --platform ios --profile production --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}

  notify:
    name: Notify on completion
    runs-on: ubuntu-latest
    needs: build-and-submit
    if: always()
    steps:
      - name: Send success notification
        if: needs.build-and-submit.result == 'success'
        run: |
          echo "✅ TestFlight build completed successfully!"
          echo "Build profile: ${{ github.event.inputs.profile || 'preview' }}"

      - name: Send failure notification
        if: needs.build-and-submit.result == 'failure'
        run: |
          echo "❌ TestFlight build failed"
          exit 1
